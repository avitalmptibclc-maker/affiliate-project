name: Supabase keep-alive

# שומר על פרויקט ה-Supabase "ער" כדי שהתוכנית החינמית לא תשהה אותו
# (פנייה קטנה אחת ביום נחשבת לפעילות). אפשר גם להריץ ידנית מלשונית Actions.

on:
  schedule:
    - cron: '17 6 * * *'   # כל יום בערך ב-06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          set -e
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjb2RzbGNyYXFvdGZranBicXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTc0MDksImV4cCI6MjA5NzAzMzQwOX0.pZPR3XRqiy_hiwgI8NEsEAGo_3XBNiEdKrwgypcgI8A"
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://ucodslcraqotfkjpbqvm.supabase.co/rest/v1/affiliate_products?select=id&limit=1" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY")
          echo "Supabase ping → HTTP $code"
          test "$code" = "200"
