<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>אביטל עציון — ההמלצות שלי</title>
  <link rel="icon" href="https://fav.farm/🤍" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" />

  <!-- ספריות מ-CDN (קובץ עצמאי שעובד בכל מקום) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: 'Heebo', Arial, sans-serif; background: #FBF6F1; }
    .drawer-body { transition: max-height .35s ease, opacity .3s ease; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    /* ============================================================
       ⚙️  הגדרות הדף
       ============================================================ */
    const SITE_PREFIX = "affiliate";
    const TABLE       = `${SITE_PREFIX}_products`;   // affiliate_products
    const ADMIN_CODE  = "5845";                       // סיסמת ממשק הניהול

    /* ====== חיבור ל-Supabase (פרויקט אחד משותף לכל הדפים) ====== */
    const SUPABASE_URL = "https://ucodslcraqotfkjpbqvm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjb2RzbGNyYXFvdGZranBicXZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTc0MDksImV4cCI6MjA5NzAzMzQwOX0.pZPR3XRqiy_hiwgI8NEsEAGo_3XBNiEdKrwgypcgI8A";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ====== ארבע המגירות (קטגוריות) ====== */
    const CATEGORIES = [
      { key: 'relationships',  label: 'כאבים ביחסים',      emoji: '💗', color: '#AA8A94', soft: '#F1E7EA' },
      { key: 'pregnancy',      label: 'הריון ולידה',       emoji: '🤰', color: '#ED8888', soft: '#FBE6E6' },
      { key: 'breastfeeding',  label: 'הנקה',              emoji: '🤱', color: '#C59976', soft: '#F1E6DA' },
      { key: 'development',    label: 'התפתחות תינוקות',   emoji: '🧸', color: '#7FB0B0', soft: '#DCEDED' },
    ];
    const catOf = (key) => CATEGORIES.find(c => c.key === key) || CATEGORIES[0];

    /* ====== אייקונים ====== */
    const Icon = ({ children, size = 20, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Chevron = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9" /></Icon>;
    const ExternalLink = (p) => <Icon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></Icon>;
    const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></Icon>;
    const Trash = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></Icon>;
    const Pencil = (p) => <Icon {...p}><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></Icon>;
    const Back = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 19 19 12 12 5" /></Icon>;

    /* ====== המרת נתונים ====== */
    const fromDb = (r) => ({ id: r.id, category: r.category, title: r.title || '', description: r.description || '', url: r.url || '', image: r.image || '' });
    const toDb   = (p) => ({ category: p.category, title: p.title || '', description: p.description || '', url: p.url || '', image: p.image || null });

    const INPUT = "w-full px-4 py-3 rounded-xl border border-[#e7d8cd] bg-white focus:outline-none focus:ring-2 focus:ring-[#ED8888] text-[#263238]";
    const EMPTY = { category: 'relationships', title: '', description: '', url: '', image: '' };

    /* ====== כרטיס מוצר (תצוגה ציבורית) ====== */
    const ProductCard = ({ p }) => {
      const c = catOf(p.category);
      return (
        <a href={p.url} target="_blank" rel="sponsored noopener noreferrer"
          className="group flex items-center gap-4 bg-white rounded-2xl p-3 sm:p-4 shadow-sm border border-[#f0e3d8] hover:shadow-md hover:-translate-y-0.5 transition-all">
          <div className="w-16 h-16 rounded-xl flex-shrink-0 flex items-center justify-center text-2xl overflow-hidden"
            style={{ background: c.soft }}>
            {p.image ? <img src={p.image} alt={p.title} className="w-full h-full object-cover" /> : <span>{c.emoji}</span>}
          </div>
          <div className="min-w-0 flex-1">
            <h4 className="font-bold text-[#263238] leading-tight break-words">{p.title}</h4>
            {p.description && <p className="text-sm text-[#7a6b66] mt-0.5 leading-snug break-words">{p.description}</p>}
          </div>
          <div className="flex-shrink-0 text-white rounded-full p-2 group-hover:scale-110 transition" style={{ background: c.color }}>
            <ExternalLink size={18} />
          </div>
        </a>
      );
    };

    /* ====== מגירה (אקורדיון) ====== */
    const Drawer = ({ cat, products, open, onToggle }) => (
      <div className="rounded-3xl overflow-hidden shadow-sm border border-[#f0e3d8] bg-white">
        <button onClick={onToggle} className="w-full flex items-center gap-3 p-5 text-right transition"
          style={{ background: open ? cat.soft : '#ffffff' }}>
          <span className="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0" style={{ background: cat.soft }}>{cat.emoji}</span>
          <span className="flex-1 text-lg sm:text-xl font-bold text-[#263238]">{cat.label}</span>
          <span className="text-sm text-white rounded-full px-2.5 py-0.5 font-medium" style={{ background: cat.color }}>{products.length}</span>
          <Chevron size={22} className={"text-[#a08e88] transition-transform " + (open ? "rotate-180" : "")} />
        </button>
        <div className="drawer-body" style={{ maxHeight: open ? '2000px' : '0', opacity: open ? 1 : 0 }}>
          <div className="p-4 pt-1 space-y-3" style={{ background: cat.soft + '55' }}>
            {products.length === 0
              ? <p className="text-center text-[#a08e88] py-4 text-sm">עדיין אין כאן מוצרים 🤍</p>
              : products.map(p => <ProductCard key={p.id} p={p} />)}
          </div>
        </div>
      </div>
    );

    /* ====== ממשק ניהול ====== */
    const Admin = ({ products, onAdd, onUpdate, onDelete, onExit }) => {
      const [form, setForm] = useState(EMPTY);
      const [editId, setEditId] = useState(null);
      const [saving, setSaving] = useState(false);
      const [err, setErr] = useState('');

      const startEdit = (p) => { setEditId(p.id); setForm({ ...p }); setErr(''); window.scrollTo({ top: 0, behavior: 'smooth' }); };
      const reset = () => { setEditId(null); setForm(EMPTY); setErr(''); };

      const submit = async (e) => {
        e.preventDefault();
        if (!form.title.trim() || !form.url.trim()) { setErr('צריך לפחות שם מוצר וקישור.'); return; }
        setSaving(true); setErr('');
        try {
          if (editId) await onUpdate(editId, form);
          else        await onAdd(form);
          reset();
        } catch (e) { setErr('שגיאה בשמירה: ' + (e.message || e)); }
        finally { setSaving(false); }
      };

      const pickImage = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => setForm(f => ({ ...f, image: ev.target.result }));
        reader.readAsDataURL(file);
      };

      return (
        <div className="max-w-2xl mx-auto px-4 py-8">
          <button onClick={onExit} className="flex items-center gap-1 text-[#a08e88] hover:text-[#263238] mb-4 text-sm">
            <Back size={16} /> חזרה לדף
          </button>
          <h2 className="text-2xl font-extrabold text-[#263238] mb-1">ממשק ניהול</h2>
          <p className="text-[#7a6b66] mb-6 text-sm">הוספה ועריכה של מוצרים. השינויים נשמרים מיד ומופיעים לכולם.</p>

          {/* טופס הוספה / עריכה */}
          <form onSubmit={submit} className="bg-white rounded-3xl p-5 shadow-sm border border-[#f0e3d8] space-y-4 mb-8">
            <h3 className="font-bold text-[#263238]">{editId ? 'עריכת מוצר' : 'הוספת מוצר חדש'}</h3>
            <div>
              <label className="block text-sm font-semibold mb-1 text-[#263238]">מגירה</label>
              <div className="grid grid-cols-2 gap-2">
                {CATEGORIES.map(c => (
                  <button type="button" key={c.key} onClick={() => setForm(f => ({ ...f, category: c.key }))}
                    className={"flex items-center gap-2 p-2.5 rounded-xl border text-sm font-medium transition " + (form.category === c.key ? "text-white border-transparent" : "bg-white text-[#263238] border-[#e7d8cd]")}
                    style={form.category === c.key ? { background: c.color } : {}}>
                    <span>{c.emoji}</span> {c.label}
                  </button>
                ))}
              </div>
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1 text-[#263238]">שם המוצר *</label>
              <input className={INPUT} value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} placeholder="למשל: כרית הנקה" />
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1 text-[#263238]">קישור (לינק האפיליאייט) *</label>
              <input className={INPUT} dir="ltr" value={form.url} onChange={e => setForm(f => ({ ...f, url: e.target.value }))} placeholder="https://..." />
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1 text-[#263238]">תיאור קצר (לא חובה)</label>
              <input className={INPUT} value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} placeholder="משפט קצר על המוצר" />
            </div>
            <div>
              <label className="block text-sm font-semibold mb-1 text-[#263238]">תמונה (לא חובה)</label>
              <div className="flex items-center gap-3">
                <div className="w-14 h-14 rounded-xl border border-[#e7d8cd] flex items-center justify-center overflow-hidden bg-[#FBF6F1] flex-shrink-0">
                  {form.image ? <img src={form.image} className="w-full h-full object-cover" /> : <span className="text-xl">{catOf(form.category).emoji}</span>}
                </div>
                <input type="file" accept="image/*" onChange={e => pickImage(e.target.files[0])} className="text-sm flex-1" />
                {form.image && <button type="button" onClick={() => setForm(f => ({ ...f, image: '' }))} className="text-xs text-[#c0848a] hover:underline">הסרה</button>}
              </div>
              <input className={INPUT + " mt-2 text-sm"} dir="ltr" value={form.image && !form.image.startsWith('data:') ? form.image : ''} onChange={e => setForm(f => ({ ...f, image: e.target.value }))} placeholder="או הדביקי כתובת תמונה https://..." />
            </div>
            {err && <p className="text-sm text-red-600">{err}</p>}
            <div className="flex gap-2">
              <button type="submit" disabled={saving} className="flex-1 bg-[#ED8888] hover:bg-[#e07373] text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 disabled:opacity-60">
                <Plus size={18} /> {saving ? 'שומר...' : (editId ? 'שמירת שינויים' : 'הוספת מוצר')}
              </button>
              {editId && <button type="button" onClick={reset} className="px-4 py-3 rounded-xl border border-[#e7d8cd] text-[#7a6b66]">ביטול</button>}
            </div>
          </form>

          {/* רשימת המוצרים הקיימים */}
          <h3 className="font-bold text-[#263238] mb-3">המוצרים שלי ({products.length})</h3>
          <div className="space-y-5">
            {CATEGORIES.map(c => {
              const list = products.filter(p => p.category === c.key);
              return (
                <div key={c.key}>
                  <div className="flex items-center gap-2 mb-2 text-sm font-bold" style={{ color: c.color }}>{c.emoji} {c.label} ({list.length})</div>
                  <div className="space-y-2">
                    {list.length === 0 && <p className="text-xs text-[#a08e88] pr-6">אין מוצרים במגירה הזו.</p>}
                    {list.map(p => (
                      <div key={p.id} className="flex items-center gap-3 bg-white rounded-xl p-3 border border-[#f0e3d8]">
                        <div className="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center overflow-hidden text-lg" style={{ background: c.soft }}>
                          {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : c.emoji}
                        </div>
                        <div className="min-w-0 flex-1">
                          <div className="font-semibold text-[#263238] text-sm truncate">{p.title}</div>
                          <div className="text-xs text-[#a08e88] truncate" dir="ltr">{p.url}</div>
                        </div>
                        <button onClick={() => startEdit(p)} className="p-2 text-[#7a6b66] hover:text-[#263238]"><Pencil size={16} /></button>
                        <button onClick={() => { if (confirm('למחוק את "' + p.title + '"?')) onDelete(p.id); }} className="p-2 text-[#c0848a] hover:text-red-600"><Trash size={16} /></button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    /* ====== האפליקציה ====== */
    function App() {
      const [products, setProducts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [loadError, setLoadError] = useState(null);
      const [openKey, setOpenKey] = useState('relationships');
      const [admin, setAdmin] = useState(false);

      const load = async () => {
        setLoading(true); setLoadError(null);
        try {
          const { data, error } = await sb.from(TABLE).select('*').order('sort_order', { ascending: true }).order('id', { ascending: true });
          if (error) throw error;
          setProducts((data || []).map(fromDb));
        } catch (e) {
          console.error(e);
          setLoadError('שגיאה בטעינת המוצרים. רענני את הדף ונסי שוב.');
        } finally { setLoading(false); }
      };
      useEffect(() => { load(); }, []);

      const add = async (p) => {
        const { data, error } = await sb.from(TABLE).insert(toDb(p)).select().single();
        if (error) throw error;
        setProducts(prev => [...prev, fromDb(data)]);
      };
      const update = async (id, p) => {
        const { data, error } = await sb.from(TABLE).update(toDb(p)).eq('id', id).select().single();
        if (error) throw error;
        setProducts(prev => prev.map(x => x.id === id ? fromDb(data) : x));
      };
      const remove = async (id) => {
        const { error } = await sb.from(TABLE).delete().eq('id', id);
        if (error) { alert('שגיאה במחיקה'); return; }
        setProducts(prev => prev.filter(x => x.id !== id));
      };

      const tryAdmin = () => {
        const code = prompt('הזיני סיסמת ניהול:');
        if (code === null) return;
        if (code === ADMIN_CODE) setAdmin(true);
        else alert('סיסמה שגויה');
      };

      if (admin) return <Admin products={products} onAdd={add} onUpdate={update} onDelete={remove} onExit={() => setAdmin(false)} />;

      return (
        <div className="min-h-screen pb-16">
          {/* כותרת */}
          <header className="text-center px-5 pt-10 pb-6 max-w-xl mx-auto">
            <div className="w-20 h-20 mx-auto rounded-full bg-gradient-to-tr from-[#ED8888] to-[#C59976] flex items-center justify-center text-white text-3xl font-extrabold shadow-md mb-4">א</div>
            <h1 className="text-2xl sm:text-3xl font-extrabold text-[#263238]">אביטל עציון</h1>
            <p className="text-[#7a6b66] mt-2 leading-relaxed">המוצרים שאני אוהבת וממליצה עליהם 🤍<br/>אספתי לכן הכל לפי נושאים — פשוט פתחו מגירה.</p>
          </header>

          {/* המגירות */}
          <main className="max-w-xl mx-auto px-4 space-y-4">
            {loading && <p className="text-center text-[#a08e88] py-10">טוען מוצרים...</p>}
            {loadError && <p className="text-center text-sm text-[#c0848a] bg-[#fbeeee] rounded-xl py-3 px-4">{loadError}</p>}
            {!loading && CATEGORIES.map(cat => (
              <Drawer key={cat.key} cat={cat}
                products={products.filter(p => p.category === cat.key)}
                open={openKey === cat.key}
                onToggle={() => setOpenKey(openKey === cat.key ? null : cat.key)} />
            ))}
          </main>

          {/* גילוי נאות + כניסת ניהול */}
          <footer className="max-w-xl mx-auto px-5 mt-10 text-center">
            <p className="text-xs text-[#b3a59f] leading-relaxed">חלק מהקישורים הם קישורי שותפים (אפיליאייט) — רכישה דרכם עשויה לזכות אותי בעמלה קטנה, ללא תוספת עלות לכן 🤍</p>
            <button onClick={tryAdmin} className="mt-5 inline-flex items-center gap-1 text-[#cdbfb8] hover:text-[#7a6b66] text-xs">
              <Lock size={13} /> ניהול
            </button>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
